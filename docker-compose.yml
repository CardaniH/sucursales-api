version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: franchise-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - franchise-network

  franchise-api:
    build: .
    container_name: franchise-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/franchise_db
    depends_on:
      - mongodb
    networks:
      - franchise-network

volumes:
  mongodb_data:

networks:
  franchise-network:
    driver: bridge